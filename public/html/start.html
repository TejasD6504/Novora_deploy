<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOVORA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { height: 100%; font-family: 'Poppins', sans-serif; overflow: hidden; }

    /* Background image */
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 110%;
      height: 110%;
        /* served as /img/... because express.static(public) exposes public/ at web root */
        background: url("/img/1.jpg") no-repeat center center;
        background-size: cover;
      transform: scale(1.05);
      transition: transform 0.3s ease;
      z-index: -3;
    }

    /* Dark overlay */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.55);
      z-index: -2;
    }

    /* Light beams overlay */
    .light-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        120deg,
        rgba(0, 150, 255, 0.15) 0%,
        rgba(255, 255, 255, 0.05) 40%,
        rgba(0, 150, 255, 0.15) 80%
      );
      animation: moveLights 8s linear infinite;
      z-index: -1;
    }
    @keyframes moveLights {
      from { transform: translateX(-20%) translateY(-20%) rotate(0deg); }
      to { transform: translateX(20%) translateY(20%) rotate(360deg); }
    }

    /* Center content */
    .container {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      z-index: 2;
      position: relative;
    }

    /* Heading */
    h1 {
      font-size: 3.5rem;
      font-weight: 700;
      margin-bottom: 20px;
      text-shadow: 0 0 25px rgba(0,0,0,0.9);
      animation: slideDown 1.5s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-60px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Typing tagline */
    .tagline {
      font-size: 1.4rem;
      font-weight: 300;
      margin-bottom: 40px;
      height: 2rem;
      white-space: nowrap;
      border-right: 2px solid #fff;
      overflow: hidden;
    }

    /* Glassmorphism card */
    .card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      padding: 40px 60px;
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      animation: zoomIn 1.5s ease;
    }
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Buttons */
    .btn {
      border: none;
      padding: 14px 40px;
      margin: 12px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: bold;
      color: white;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #10b981, #0ea5e9);
    }
    .btn::after {
      content: "";
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.25);
      transition: 0.4s;
    }
    .btn:hover::after { left: 0; }
    .btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 0 25px #0ea5e9; }

    /* Homepage main button */
    .btn-main {
      background: white;
      color: black;
      font-weight: bold;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.6); }
      70% { box-shadow: 0 0 20px 12px rgba(255,255,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 3;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px 60px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      animation: modalPop 0.6s forwards;
      position: relative;
    }
    @keyframes modalPop {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .modal-content h2 { margin-bottom: 25px; color: black; }
    .close {
      position: absolute;
      top: 20px; right: 30px;
      font-size: 32px; font-weight: bold; color: #333;
      cursor: pointer;
    }
    .close:hover { color: red; }
  </style>
</head>
<body>
  <!-- Background -->
  <div class="bg" id="bg"></div>
  <div class="overlay"></div>
  <div class="light-overlay"></div>

  <!-- Main content -->
  <div class="container">
    <h1>Welcome to NOVORA</h1>
    <div class="tagline" id="tagline"></div>
    <div class="card">
      <button class="btn btn-main" onclick="openModal()">Login / Signup</button>
    </div>
  </div>

  <!-- Modal (hidden initially) -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2>Select Option</h2>
      <button class="btn" onclick="location.href='admin.html'">Admin Login</button>
      <button class="btn" onclick="location.href='user.html'">User Login</button>
      <button class="btn" onclick="location.href='signup.html'">Signup</button>
    </div>
  </div>

  <script>
    function openModal() {
      document.getElementById("loginModal").style.display = "flex";
    }
    function closeModal() {
      document.getElementById("loginModal").style.display = "none";
    }

    // Parallax background
    const bg = document.getElementById("bg");
    document.addEventListener("mousemove", e => {
      let x = (e.clientX / window.innerWidth - 0.5) * 10;
      let y = (e.clientY / window.innerHeight - 0.5) * 10;
      bg.style.transform = `scale(1.05) translate(${x}px, ${y}px)`;
    });

    // Typing text effect with multiple phrases
    const phrases = [
      "Automating Storage. Delivering Efficiency.",
      "Smart Warehousing for a Smarter Future.",
      "Seamless Logistics. Maximum Productivity.",
      "Your Warehouse, Fully Optimized."
    ];
    let i = 0, j = 0;
    let currentPhrase = [], isDeleting = false;
    const speed = 100;
    const tagline = document.getElementById("tagline");

    function loop() {
      tagline.innerHTML = currentPhrase.join("") + '<span style="border-right:2px solid #fff"></span>';
      if (!isDeleting && j <= phrases[i].length) {
        currentPhrase.push(phrases[i][j]);
        j++;
        setTimeout(loop, speed);
      } else if (isDeleting && j >= 0) {
        currentPhrase.pop();
        j--;
        setTimeout(loop, speed / 2);
      } else if (!isDeleting && j === phrases[i].length) {
        isDeleting = true;
        setTimeout(loop, 1500);
      } else if (isDeleting && j === 0) {
        isDeleting = false;
        i = (i + 1) % phrases.length;
        setTimeout(loop, 500);
      }
    }
    loop();
  </script>
</body>
</html>
